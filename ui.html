<body>

<div class="container">

    <h1>🧠 KritikaMedi AI</h1>
    <p>Diabetes Risk Predictor</p>

    <div class="card">
        <h3>Enter Details</h3>

        <input type="number" id="age" placeholder="Age"><br>
        <input type="number" id="glucose" placeholder="Glucose"><br>
        <input type="number" id="bmi" placeholder="BMI"><br>

        <button onclick="calculate()">Check Risk</button>
    </div>

    <div id="output" class="result" style="display:none;"></div>

</div>

<script>
function calculate(){
    let age = parseFloat(document.getElementById("age").value);
    let glucose = parseFloat(document.getElementById("glucose").value);
    let bmi = parseFloat(document.getElementById("bmi").value);

    if(isNaN(age) || isNaN(glucose) || isNaN(bmi)){
        alert("Please enter all values");
        return;
    }

    // Formula
    let glucose_part = glucose * 0.03;
    let bmi_part = bmi * 0.02;
    let age_part = age * 0.01;

    let score = glucose_part + bmi_part + age_part;

    // Result
    let result = score > 5 
        ? "High Risk ⚠️ Diabetes" 
        : "Low Risk ✅ No Diabetes";

    document.getElementById("output").style.display = "block";

    document.getElementById("output").innerHTML = `
        <h2>Result</h2>
        <p><b>Score:</b> ${score.toFixed(2)}</p>
        <p><b>Status:</b> ${result}</p>

        <hr>

        <h3>📊 Calculation</h3>
        <p>Glucose × 0.03 = ${glucose_part.toFixed(2)}</p>
        <p>BMI × 0.02 = ${bmi_part.toFixed(2)}</p>
        <p>Age × 0.01 = ${age_part.toFixed(2)}</p>

        <hr>
        <b>Total Score = ${score.toFixed(2)}</b>
    `;
}
</script>
